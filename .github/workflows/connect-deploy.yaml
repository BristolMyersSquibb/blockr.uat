name: connect-deploy

on:
  pull_request:
  merge_group:

jobs:
  connect-deploy:
    # Pinned to the blockr.ci#25 branch until it merges; flip to @main then.
    # (check-suggests is branch-pinned on #25, so it resolves pre-merge.)
    uses: BristolMyersSquibb/blockr.ci/.github/workflows/connect-deploy.yaml@24-connect-deploy
    permissions:
      contents: read
    with:
      auth: deploy-key
      r-version: "4.4.2"
      # Pin a dated RHEL 8 (centos8) snapshot for reproducible deploys. The
      # reusable workflow builds the manifest in a RHEL 8 container and records
      # this URL verbatim, so Connect installs binaries; it otherwise defaults
      # to centos8/latest.
      repos: https://packagemanager.posit.co/cran/__linux__/centos8/2026-06-18
    secrets:
      DEPLOY_KEY: ${{ secrets.CONNECT_DEPLOY_SSH_KEY }}
